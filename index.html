<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Draft Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="draft-header">
        <div class="ban-section blue-bans" id="blue-bans">
            <div class="ban-slot"></div><div class="ban-slot"></div><div class="ban-slot"></div><div class="ban-slot"></div><div class="ban-slot"></div>
        </div>
        
        <div class="draft-status">
            <h2 id="phase-indicator">BAN PHASE</h2>
            <div class="clash-bar-container">
                <div class="clash-bar-blue" id="win-bar-blue" style="width: 50%;"></div>
                <div class="clash-bar-red" id="win-bar-red" style="width: 50%;"></div>
                <div class="clash-bar-text" id="win-rate-display">50% - 50%</div>
            </div>
        </div>

        <div class="ban-section red-bans" id="red-bans">
            <div class="ban-slot"></div><div class="ban-slot"></div><div class="ban-slot"></div><div class="ban-slot"></div><div class="ban-slot"></div>
        </div>
    </header>

    <main id="draft-arena">
        
        <aside class="team-panel blue-team">
            <ul id="ally-picks">
                <li class="pick-slot"></li><li class="pick-slot"></li><li class="pick-slot"></li><li class="pick-slot"></li><li class="pick-slot"></li>
            </ul>
        </aside>

        <section id="center-console">
            
            <div id="recommendations-banner">
                <h4>Top Counters</h4>
                <ul id="top-picks"><li>Waiting for draft...</li></ul>
            </div>

            <nav id="role-filters">
                <button class="filter-btn active" data-filter="All">All Lanes</button>
                <button class="filter-btn" data-filter="Tank">Roam</button>
                <button class="filter-btn" data-filter="Fighter">EXP</button>
                <button class="filter-btn" data-filter="Assassin">Jungle</button>
                <button class="filter-btn" data-filter="Mage">Mid</button>
                <button class="filter-btn" data-filter="Marksman">Gold</button>
            </nav>

            <div id="hero-pool-scroll">
                <div class="hero-grid" id="main-hero-grid">
                    </div>
            </div>
            
            <div id="action-bar">
                <button id="btn-ban" class="action-btn">Ban Hero</button>
                <button id="btn-pick-blue" class="action-btn blue-btn">Pick Blue</button>
                <button id="btn-pick-red" class="action-btn red-btn">Pick Red</button>
            </div>
        </section>

        <aside class="team-panel red-team">
            <ul id="enemy-picks">
                <li class="pick-slot"></li><li class="pick-slot"></li><li class="pick-slot"></li><li class="pick-slot"></li><li class="pick-slot"></li>
            </ul>
        </aside>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
